apiVersion: apps/v1
kind: Deployment
metadata:
  name: pacman-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pacman
  template:
    metadata:
      labels:
        app: pacman
    spec:
      containers:
      - name: pacman
        image:  public.ecr.aws/k5u0o7b3/fadi/pacman:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: pacman-config
