apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: my-eks-cluster
  region: us-east-1
  version: "1.35"

iam:
  withOIDC: true

vpc:
  cidr: 10.0.0.0/16
  clusterEndpoints:
    publicAccess: true
    privateAccess: false
  nat:
    gateway: Disable
  subnets:
    public:
      us-east-1a:
        cidr: 10.0.1.0/24
        tags:
          kubernetes.io/role/elb: "1"
      us-east-1b:
        cidr: 10.0.2.0/24
        tags:
          kubernetes.io/role/elb: "1"

managedNodeGroups:
  - name: ng-public
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 20
    privateNetworking: false
    ssh:
      allow: false

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
