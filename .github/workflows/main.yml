name: cicd
on:  
  push:
    branches: [main]
    
permissions:
  id-token: write
  contents: read
  
jobs:
  cicd_job:
    name: deploy to eks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-region: us-east-2
        role-to-assume: arn:aws:iam::416338226474:role/GitHubActionsEKSRole
        role-session-name: github-actions-eks
        
    - name: Verify AWS identity
      run: aws sts get-caller-identity
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
        
    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: myapps/pacman
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd docker
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
    
    - name: Deploy to EKS
      env:
        EKS_REGION: us-east-2
        CLUSTER_NAME: PacmanCluster
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        aws eks update-kubeconfig --region $EKS_REGION --name $CLUSTER_NAME
        cd k8s
        kubectl apply -f storage-class.yaml
        kubectl apply -f mongo-sts.yaml
        kubectl apply -f mongo-service.yaml
        kubectl apply -f pacman-configmap.yaml
        kubectl apply -f pacman-deployment.yaml
        kubectl apply -f pacman-service.yaml
        kubectl set image deployment/pacman-deployment pacman=$REGISTRY:${{ github.sha }}
        kubectl rollout status deployment/pacman-deployment

    - name: Verify rollout
      run: |
        kubectl get pods
        kubectl get svc
